<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Shirts Pro | Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>⚽ Crear cuenta</h1>
            <p>Regístrate para empezar</p>
            
            <form id="registroForm">
                <div class="form-group">
                    <input type="text" id="regUsername" placeholder="Nombre de usuario" required>
                </div>
                <div class="form-group">
                    <input type="email" id="regEmail" placeholder="Correo electrónico" required>
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse</button>
                <button type="button" id="volverLogin" class="btn btn-secondary">Volver</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
