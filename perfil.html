<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Shirts Pro | Mi Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>⚽ FOOTBALL SHIRTS PRO</h2>
            </div>
            <div class="nav-links">
                <a href="tienda.html" class="nav-link">Tienda</a>
                <a href="subir-camiseta.html" class="nav-link">+ Subir Camiseta</a>
                <a href="mensajes.html" class="nav-link" id="mensajesLink">💬 Mensajes <span id="mensajesCount" style="background-color: #e74c3c; color: white; border-radius: 50%; padding: 0.2rem 0.5rem; font-size: 0.7rem; margin-left: 0.3rem; display: none;">0</span></a>
                <a href="#" id="cerrarSesion" class="nav-link">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="perfil-header">
            <div class="avatar" id="avatarContainer" style="position: relative; cursor: pointer;">
                <div id="avatarPreview" style="width: 80px; height: 80px; border-radius: 50%; background: #f39c12; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; overflow: hidden;">
                    
                </div>
                <div style="position: absolute; bottom: 0; right: 0; background: #3498db; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: white; border: 2px solid white;">
                    📷
                </div>
                <input type="file" id="fotoPerfilInput" accept="image/jpeg, image/png, image/webp" style="display: none;">
            </div>
            <div>
                <h2 id="nombreUsuario"></h2>
                <small id="emailUsuario"></small>
                <p style="margin-top: 0.5rem; font-size: 0.8rem; color: #999;">Hacé click en la foto para cambiarla</p>
            </div>
        </div>

        <h3>Mis publicaciones</h3>
        <div id="misPublicaciones" class="productos-grid">
            <!-- Aquí se cargan las publicaciones del usuario -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
