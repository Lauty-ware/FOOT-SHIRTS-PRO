<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Shirts Pro | Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1> FOOTBALL SHIRTS PRO</h1>
            <p>Compra y venta de camisetas de fútbol</p>
            <p style="margin: 1rem 0 2rem 0;">Inicia sesión para continuar</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Nombre de usuario" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary">Ingresar</button>
                <button type="button" id="btnRegistro" class="btn btn-secondary">Registrarse</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
