<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Shirts Pro | Subir Camiseta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>⚽ FOOTBALL SHIRTS PRO</h2>
            </div>
            <div class="nav-links">
                <a href="tienda.html" class="nav-link">Tienda</a>
                <a href="perfil.html" class="nav-link">Mi Perfil</a>
                <a href="#" id="cerrarSesion" class="nav-link">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="formulario">
            <h2>Subir nueva camiseta</h2>
            <form id="publicarForm">
                <div class="form-group">
                    <label>Nombre de la camiseta</label>
                    <input type="text" id="nombre" placeholder="Ej: Barcelona 2010 - Messi" required>
                </div>
                <div class="form-group">
                    <label>Precio ($)</label>
                    <input type="number" id="precio" placeholder="Ej: 130000" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="descripcion" rows="4" placeholder="Describe la camiseta, estado, talla, etc." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Publicar</button>
                <a href="tienda.html" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
