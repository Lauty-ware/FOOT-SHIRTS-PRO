<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Shirts Pro | Subir Camiseta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>⚽ FOOTBALL SHIRTS PRO</h2>
            </div>
            <div class="nav-links">
                <a href="tienda.html" class="nav-link">Tienda</a>
                <a href="perfil.html" class="nav-link">Mi Perfil</a>
                <a href="#" id="cerrarSesion" class="nav-link">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="formulario">
            <h2>Subir nueva camiseta</h2>
            <form id="publicarForm">
                <div class="form-group">
                    <label>Nombre de la camiseta *</label>
                    <input type="text" id="nombre" placeholder="Ej: Barcelona 2010 - Messi" required>
                </div>
                
                <div class="form-group">
                    <label>Precio ($) *</label>
                    <input type="number" id="precio" placeholder="Ej: 130000" required>
                </div>
                
                <div class="form-group">
                    <label>📸 Imagen de la camiseta</label>
                    <div style="border: 2px dashed #ddd; border-radius: 12px; padding: 1rem; text-align: center; cursor: pointer;" id="dropZone">
                        <input type="file" id="imagen" accept="image/jpeg, image/png, image/webp" style="display: none;">
                        <div id="previewContainer" style="margin-bottom: 0.5rem;">
                            <div style="font-size: 3rem;">👕</div>
                        </div>
                        <p style="color: #666; margin: 0.5rem 0;">Hacé click o arrastrá una imagen</p>
                        <small style="color: #999;">Formatos: JPG, PNG, WEBP. Máx 2MB</small>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🏷️ Etiquetas (separadas por comas)</label>
                    <input type="text" id="etiquetas" placeholder="Ej: Barcelona, Messi, 2010, Original, M, LaLiga">
                    <small style="color: #666; display: block; margin-top: 0.3rem;">
                        💡 Ejemplos: equipo, jugador, año, talla, estado, liga, colección
                    </small>
                </div>
                
                <div class="form-group">
                    <label>📝 Descripción *</label>
                    <textarea id="descripcion" rows="4" placeholder="Describe la camiseta: estado, talla, detalles, etc." required></textarea>
                </div>
                
                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">📤 Publicar</button>
                    <a href="tienda.html" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
